name: Services CI/CD

# Monorepo CI - Builds only services that have changed
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'helm-charts/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'helm-charts/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
          else
            BASE_SHA=${{ github.event.before }}
          fi

          # Handle initial commit
          if [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi

          # Get changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD)

          # Detect which services changed
          SERVICES=""
          for service in basket-api catalog-api ordering-api identity-api payment-api webhook-api web-spa mobile-bff ordering-signalr api-gateway; do
            if echo "$CHANGED_FILES" | grep -qE "(services/$service/|helm-charts/$service/)"; then
              SERVICES="${SERVICES}${service},"
            fi
          done

          # Remove trailing comma
          SERVICES=${SERVICES%,}

          echo "Changed services: $SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

      - name: Set build matrix
        id: set-matrix
        run: |
          SERVICES="${{ steps.changes.outputs.services }}"

          if [ -z "$SERVICES" ]; then
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
          else
            # Convert comma-separated to JSON array
            JSON_ARRAY=$(echo "$SERVICES" | tr ',' '\n' | jq -R . | jq -s -c .)
            echo "matrix={\"service\":$JSON_ARRAY}" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Update Helm values
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          VALUES_FILE="helm-charts/${{ matrix.service }}/values.yaml"

          if [ -f "$VALUES_FILE" ]; then
            sed -i "s/^\(\s*tag:\s*\).*/\1\"${SHORT_SHA}\"/" "$VALUES_FILE"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add "$VALUES_FILE"
            git commit -m "ci: update ${{ matrix.service }} image to ${SHORT_SHA}" || echo "No changes"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }} || echo "Push failed, may need retry"
          fi

  summary:
    name: Build Summary
    needs: [detect-changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## Services CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Changed Services:** ${{ needs.detect-changes.outputs.services || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status:** ${{ needs.build.result || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
