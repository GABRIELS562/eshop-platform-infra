---
# eShop Platform Ansible Inventory
# Server connectivity via Tailscale VPN

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

  children:
    k3s_cluster:
      hosts:
        server1:
          ansible_host: 100.89.26.128
          ansible_user: jaime
          k3s_role: master
          local_ip: 192.168.50.100

    monitoring:
      hosts:
        server2:
          ansible_host: 100.103.13.92
          ansible_user: jaime
          local_ip: 192.168.50.74
          vault_port: 8200
          prometheus_port: 9090
          grafana_port: 3000
          loki_port: 3100

    # Logical groupings
    eshop_infrastructure:
      children:
        k3s_cluster:
        monitoring:
