---
# eShop Infrastructure Role
# Deploys the complete eShop platform to K3s

- name: Create eshop namespace
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/namespace.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  tags:
    - namespace
    - always

- name: Apply ServiceAccounts
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/rbac/service-accounts.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  tags:
    - rbac
    - serviceaccounts

- name: Apply RBAC Roles
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/rbac/roles.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  tags:
    - rbac
    - roles

- name: Apply RBAC RoleBindings
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/rbac/role-bindings.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  tags:
    - rbac
    - rolebindings

- name: Apply NetworkPolicies
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  with_fileglob:
    - "{{ playbook_dir }}/../k8s/network-policies/*.yaml"
  tags:
    - networkpolicies
    - security

- name: Apply ClusterSecretStore for Vault
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/external-secrets/cluster-secret-store.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  tags:
    - secrets
    - vault

- name: Apply ExternalSecrets
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  with_fileglob:
    - "{{ playbook_dir }}/../k8s/external-secrets/*-secrets.yaml"
  tags:
    - secrets
    - externalsecrets

# Deploy Infrastructure Services
- name: Deploy RabbitMQ
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  with_fileglob:
    - "{{ playbook_dir }}/../k8s/infrastructure/rabbitmq/*.yaml"
  tags:
    - infrastructure
    - rabbitmq

- name: Deploy Redis
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  with_fileglob:
    - "{{ playbook_dir }}/../k8s/infrastructure/redis/*.yaml"
  tags:
    - infrastructure
    - redis

- name: Deploy PostgreSQL
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  with_fileglob:
    - "{{ playbook_dir }}/../k8s/infrastructure/postgresql/*.yaml"
  tags:
    - infrastructure
    - postgresql

- name: Deploy Seq
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  with_fileglob:
    - "{{ playbook_dir }}/../k8s/infrastructure/seq/*.yaml"
  tags:
    - infrastructure
    - seq

# Wait for infrastructure to be ready
- name: Wait for RabbitMQ to be ready
  kubernetes.core.k8s_info:
    kind: StatefulSet
    name: rabbitmq
    namespace: eshop
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  register: rabbitmq_status
  until: rabbitmq_status.resources[0].status.readyReplicas | default(0) >= 1
  retries: 30
  delay: 10
  tags:
    - infrastructure
    - verify

- name: Wait for Redis to be ready
  kubernetes.core.k8s_info:
    kind: StatefulSet
    name: redis
    namespace: eshop
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  register: redis_status
  until: redis_status.resources[0].status.readyReplicas | default(0) >= 1
  retries: 30
  delay: 10
  tags:
    - infrastructure
    - verify

- name: Wait for PostgreSQL to be ready
  kubernetes.core.k8s_info:
    kind: StatefulSet
    name: postgresql
    namespace: eshop
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  register: postgresql_status
  until: postgresql_status.resources[0].status.readyReplicas | default(0) >= 1
  retries: 30
  delay: 10
  tags:
    - infrastructure
    - verify

# Apply ArgoCD Project
- name: Apply ArgoCD eShop Project
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../argocd/projects/eshop-project.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  tags:
    - apps
    - argocd

# Apply ArgoCD Applications
- name: Apply ArgoCD Applications
  kubernetes.core.k8s:
    state: present
    src: "{{ item }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  with_fileglob:
    - "{{ playbook_dir }}/../argocd/applications/*.yaml"
  tags:
    - apps
    - argocd

# Verify all pods are running
- name: Get all pods in eshop namespace
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: eshop
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: yes
  register: eshop_pods
  tags:
    - verify

- name: Display pod status
  debug:
    msg: "{{ item.metadata.name }}: {{ item.status.phase }}"
  loop: "{{ eshop_pods.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  tags:
    - verify
