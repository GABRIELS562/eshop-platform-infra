apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  labels:
    app: otel-collector
    env: production
    team: platform
spec:
  project: eshop
  source:
    repoURL: https://github.com/GABRIELS562/eshop-platform-infra
    targetRevision: main
    path: helm-charts/otel-collector
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: eshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
