# Default values for adservice
# This is a YAML-formatted file.

replicaCount: 1
image:
  repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice
  tag: "v0.10.5"
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: adservice-sa
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9555"
  prometheus.io/path: "/metrics"
podLabels:
  app: adservice
  tier: backend
  env: production
  team: platform
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 9555
  targetPort: 9555
resources:
  requests:
    memory: "180Mi"
    cpu: "100m"
  limits:
    memory: "300Mi"
    cpu: "300m"
autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
livenessProbe:
  grpc:
    port: 9555
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  grpc:
    port: 9555
  initialDelaySeconds: 20
  periodSeconds: 5
  timeoutSeconds: 3
startupProbe:
  grpc:
    port: 9555
  initialDelaySeconds: 15
  failureThreshold: 30
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - adservice
          topologyKey: kubernetes.io/hostname
podDisruptionBudget:
  minAvailable: 1
env:
  - name: PORT
    value: "9555"
  # OpenTelemetry Configuration
  - name: ENABLE_TRACING
    value: "1"
  - name: COLLECTOR_SERVICE_ADDR
    value: "otel-collector.eshop.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "adservice"
