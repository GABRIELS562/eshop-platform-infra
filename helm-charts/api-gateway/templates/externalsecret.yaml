{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "api-gateway.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "api-gateway.fullname" . }}-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "api-gateway.labels" . | nindent 10 }}
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: JWT_SECRET
    - secretKey: RATE_LIMIT_KEY
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: RATE_LIMIT_KEY
  dataFrom:
    - extract:
        key: secret/eshop/global
{{- end }}
