# Default values for cartservice
# This is a YAML-formatted file.

replicaCount: 1
image:
  repository: gcr.io/google-samples/microservices-demo/cartservice
  tag: "v0.10.5"
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: cartservice-sa
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "7070"
  prometheus.io/path: "/metrics"
podLabels:
  app: cartservice
  tier: backend
  env: production
  team: platform
  needs-redis: "true"
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 7070
  targetPort: 7070
resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"
autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
livenessProbe:
  grpc:
    port: 7070
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  grpc:
    port: 7070
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
startupProbe:
  grpc:
    port: 7070
  initialDelaySeconds: 5
  failureThreshold: 30
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - cartservice
          topologyKey: kubernetes.io/hostname
podDisruptionBudget:
  minAvailable: 1
env:
  - name: REDIS_ADDR
    value: "redis-cart.eshop.svc.cluster.local:6379"
