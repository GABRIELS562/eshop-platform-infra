# Default values for checkoutservice
# This is a YAML-formatted file.

replicaCount: 1
image:
  repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/checkoutservice
  tag: "v0.10.5"
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: checkoutservice-sa
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "5050"
  prometheus.io/path: "/metrics"
podLabels:
  app: checkoutservice
  tier: backend
  env: production
  team: platform
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 5050
  targetPort: 5050
resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"
autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
livenessProbe:
  grpc:
    port: 5050
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  grpc:
    port: 5050
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
startupProbe:
  grpc:
    port: 5050
  initialDelaySeconds: 5
  failureThreshold: 30
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - checkoutservice
          topologyKey: kubernetes.io/hostname
podDisruptionBudget:
  minAvailable: 1
env:
  - name: PORT
    value: "5050"
  - name: PRODUCT_CATALOG_SERVICE_ADDR
    value: "productcatalogservice.eshop.svc.cluster.local:3550"
  - name: SHIPPING_SERVICE_ADDR
    value: "shippingservice.eshop.svc.cluster.local:50051"
  - name: PAYMENT_SERVICE_ADDR
    value: "paymentservice.eshop.svc.cluster.local:50051"
  - name: EMAIL_SERVICE_ADDR
    value: "emailservice.eshop.svc.cluster.local:8080"
  - name: CURRENCY_SERVICE_ADDR
    value: "currencyservice.eshop.svc.cluster.local:7000"
  - name: CART_SERVICE_ADDR
    value: "cartservice.eshop.svc.cluster.local:7070"
  - name: DISABLE_PROFILER
    value: "1"
  # OpenTelemetry Configuration
  - name: COLLECTOR_SERVICE_ADDR
    value: "otel-collector.eshop.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "checkoutservice"
