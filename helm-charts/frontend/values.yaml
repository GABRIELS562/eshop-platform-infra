# Default values for frontend
# This is a YAML-formatted file.

replicaCount: 1
image:
  repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/frontend
  tag: "v0.10.5"
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: frontend-sa
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
podLabels:
  app: frontend
  tier: frontend
  env: production
  team: platform
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  host: frontend.jagdevops.co.za
  paths:
    - path: /
      pathType: Prefix
  tls:
    - secretName: frontend-tls
      hosts:
        - frontend.jagdevops.co.za
resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"
autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
livenessProbe:
  httpGet:
    path: /_healthz
    port: 8080
    httpHeaders:
      - name: Cookie
        value: "shop_session-id=x-liveness-probe"
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /_healthz
    port: 8080
    httpHeaders:
      - name: Cookie
        value: "shop_session-id=x-readiness-probe"
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
startupProbe:
  httpGet:
    path: /_healthz
    port: 8080
    httpHeaders:
      - name: Cookie
        value: "shop_session-id=x-startup-probe"
  initialDelaySeconds: 5
  failureThreshold: 30
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - frontend
          topologyKey: kubernetes.io/hostname
podDisruptionBudget:
  minAvailable: 1
env:
  - name: PORT
    value: "8080"
  - name: PRODUCT_CATALOG_SERVICE_ADDR
    value: "productcatalogservice.eshop.svc.cluster.local:3550"
  - name: CURRENCY_SERVICE_ADDR
    value: "currencyservice.eshop.svc.cluster.local:7000"
  - name: CART_SERVICE_ADDR
    value: "cartservice.eshop.svc.cluster.local:7070"
  - name: RECOMMENDATION_SERVICE_ADDR
    value: "recommendationservice.eshop.svc.cluster.local:8080"
  - name: SHIPPING_SERVICE_ADDR
    value: "shippingservice.eshop.svc.cluster.local:50051"
  - name: CHECKOUT_SERVICE_ADDR
    value: "checkoutservice.eshop.svc.cluster.local:5050"
  - name: AD_SERVICE_ADDR
    value: "adservice.eshop.svc.cluster.local:9555"
  - name: SHOPPING_ASSISTANT_SERVICE_ADDR
    value: "shoppingassistantservice:80"
  - name: ENABLE_PROFILER
    value: "0"
  # OpenTelemetry Configuration
  - name: ENABLE_TRACING
    value: "1"
  - name: COLLECTOR_SERVICE_ADDR
    value: "otel-collector.eshop.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "frontend"
