{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "identity-api.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "identity-api.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "identity-api.fullname" . }}-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "identity-api.labels" . | nindent 10 }}
  data:
    - secretKey: DATABASE_CONNECTION
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: DATABASE_CONNECTION
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: JWT_SECRET
  dataFrom:
    - extract:
        key: secret/eshop/global
{{- end }}
