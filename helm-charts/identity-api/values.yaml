# Default values for identity-api
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: ghcr.io/gabriels562/identity-api
  tag: "10a9632"
  tag: "0db7625"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: identity-api-sa
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"
  prometheus.io/path: "/metrics"

podLabels:
  app: identity-api
  tier: backend
  env: production
  team: platform
  needs-database: "true"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  host: identity-api.jagdevops.co.za
  paths:
    - path: /
      pathType: Prefix
  tls:
    - secretName: identity-api-tls
      hosts:
        - identity-api.jagdevops.co.za

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health/live
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - identity-api
          topologyKey: kubernetes.io/hostname

vault:
  enabled: true
  secretPath: secret/eshop/identity-api

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"
  - name: ASPNETCORE_URLS
    value: "http://+:80"

envFrom:
  - secretRef:
      name: identity-api-secrets

configMap:
  enabled: true
  data:
    Database__Connection: "sqlserver.eshop.svc.cluster.local"
    Issuer__Url: "https://identity-api.jagdevops.co.za"
