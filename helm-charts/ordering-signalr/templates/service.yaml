apiVersion: v1
kind: Service
metadata:
  name: {{ include "ordering-signalr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ordering-signalr.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "ordering-signalr.selectorLabels" . | nindent 4 }}
