# Default values for productcatalogservice
# This is a YAML-formatted file.

replicaCount: 1
image:
  repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice
  tag: "v0.10.5"
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: productcatalogservice-sa
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3550"
  prometheus.io/path: "/metrics"
podLabels:
  app: productcatalogservice
  tier: backend
  env: production
  team: platform
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 3550
  targetPort: 3550
resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"
autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
livenessProbe:
  grpc:
    port: 3550
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  grpc:
    port: 3550
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
startupProbe:
  grpc:
    port: 3550
  initialDelaySeconds: 5
  failureThreshold: 30
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - productcatalogservice
          topologyKey: kubernetes.io/hostname
podDisruptionBudget:
  minAvailable: 1
env:
  - name: PORT
    value: "3550"
  - name: DISABLE_PROFILER
    value: "1"
  # OpenTelemetry Configuration
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector.eshop.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "productcatalogservice"
