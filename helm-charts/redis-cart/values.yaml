# Default values for redis-cart
# This is a YAML-formatted file.

replicaCount: 1
image:
  repository: redis
  tag: "alpine"
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: redis-cart-sa
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "6379"
  prometheus.io/path: "/metrics"
podLabels:
  app: redis-cart
  tier: infrastructure
  env: production
  team: platform
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  fsGroup: 999
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 6379
  targetPort: 6379
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"
livenessProbe:
  tcpSocket:
    port: 6379
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  tcpSocket:
    port: 6379
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
nodeSelector: {}
tolerations: []
affinity: {}
volumeClaimTemplates: []
