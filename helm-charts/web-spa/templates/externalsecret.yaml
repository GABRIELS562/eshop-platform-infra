{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "web-spa.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "web-spa.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "web-spa.fullname" . }}-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "web-spa.labels" . | nindent 10 }}
  data:
    - secretKey: API_KEY
      remoteRef:
        key: {{ .Values.vault.secretPath }}
        property: API_KEY
  dataFrom:
    - extract:
        key: secret/eshop/global
{{- end }}
