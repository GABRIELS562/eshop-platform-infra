# Default values for web-spa
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: ghcr.io/gabriels562/web-spa
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: web-spa-sa
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"
  prometheus.io/path: "/metrics"

podLabels:
  app: web-spa
  tier: frontend
  env: production
  team: platform

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  host: web-spa.jagdevops.co.za
  paths:
    - path: /
      pathType: Prefix
  tls:
    - secretName: web-spa-tls
      hosts:
        - web-spa.jagdevops.co.za

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health/live
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - web-spa
          topologyKey: kubernetes.io/hostname

vault:
  enabled: true
  secretPath: secret/eshop/web-spa

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  - name: NODE_ENV
    value: "production"

envFrom:
  - secretRef:
      name: web-spa-secrets

configMap:
  enabled: true
  data:
    API_GATEWAY_URL: "https://api-gateway.jagdevops.co.za"
    IDENTITY_URL: "https://identity-api.jagdevops.co.za"
