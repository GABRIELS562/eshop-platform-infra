# Default values for webhook-api
# This is a YAML-formatted file.

replicaCount: 1
image:
  repository: ghcr.io/gabriels562/webhook-api
  tag: "9dd4480"
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: webhook-api-sa
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"
  prometheus.io/path: "/metrics"
podLabels:
  app: webhook-api
  tier: backend
  env: production
  team: platform
  needs-rabbitmq: "true"
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 80
  targetPort: 80
ingress:
  enabled: false
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  host: webhook-api.jagdevops.co.za
  paths:
    - path: /
      pathType: Prefix
  tls:
    - secretName: webhook-api-tls
      hosts:
        - webhook-api.jagdevops.co.za
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"
autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
livenessProbe:
  httpGet:
    path: /health/live
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health/ready
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
startupProbe:
  httpGet:
    path: /health/live
    port: 80
  initialDelaySeconds: 10
  failureThreshold: 30
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - webhook-api
          topologyKey: kubernetes.io/hostname
vault:
  secretPath: secret/eshop/webhook-api
podDisruptionBudget:
  minAvailable: 1
env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"
  - name: ASPNETCORE_URLS
    value: "http://+:80"
configMap:
  data:
    Identity__Url: "http://identity-api.eshop.svc.cluster.local"
    EventBus__Connection: "rabbitmq.eshop.svc.cluster.local"
    EventBus__UserName: "guest"
