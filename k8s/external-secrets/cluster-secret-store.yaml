---
# ClusterSecretStore for HashiCorp Vault backend
# This resource enables cluster-wide access to secrets stored in Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/name: vault-backend
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: eshop-platform
spec:
  # Conditions for when the store is considered ready
  conditions:
    - type: Ready
      status: "True"
  provider:
    vault:
      # Vault server endpoint
      server: "http://100.103.13.92:8200"
      # Path to the secrets engine
      path: "secret"
      # KV secrets engine version
      version: "v2"
      # Namespace for Vault Enterprise (leave empty for OSS)
      # namespace: ""
      # Authentication configuration
      auth:
        kubernetes:
          # Mount path of the Kubernetes auth method in Vault
          mountPath: "kubernetes"
          # Vault role to authenticate as
          role: "eshop-role"
          # Service account used for authentication
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
      # Optional: CA certificate for TLS verification
      # caProvider:
      #   type: ConfigMap
      #   name: vault-ca
      #   namespace: external-secrets
      #   key: ca.crt
