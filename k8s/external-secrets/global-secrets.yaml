---
# ExternalSecret for global shared secrets (RabbitMQ configuration)
# These secrets are shared across multiple microservices
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: global-secrets
  namespace: eshop
  labels:
    app.kubernetes.io/name: global-secrets
    app.kubernetes.io/component: configuration
    app.kubernetes.io/part-of: eshop-platform
spec:
  # How often to refresh secrets from Vault
  refreshInterval: "1h"
  # Reference to the ClusterSecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  # Target Kubernetes Secret configuration
  target:
    name: global-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: global-secrets
          app.kubernetes.io/component: configuration
          app.kubernetes.io/part-of: eshop-platform
  # Data mappings from Vault to Kubernetes Secret
  data:
    - secretKey: RABBITMQ_HOST
      remoteRef:
        key: secret/data/eshop/global
        property: RABBITMQ_HOST
    - secretKey: RABBITMQ_USER
      remoteRef:
        key: secret/data/eshop/global
        property: RABBITMQ_USER
    - secretKey: RABBITMQ_PASS
      remoteRef:
        key: secret/data/eshop/global
        property: RABBITMQ_PASS
