---
# ExternalSecret for Ordering API service
# Contains database connection string and Identity service URL
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ordering-api-secrets
  namespace: eshop
  labels:
    app.kubernetes.io/name: ordering-api-secrets
    app.kubernetes.io/component: configuration
    app.kubernetes.io/part-of: eshop-platform
    app.kubernetes.io/managed-by: external-secrets
spec:
  # How often to refresh secrets from Vault
  refreshInterval: "1h"
  # Reference to the ClusterSecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  # Target Kubernetes Secret configuration
  target:
    name: ordering-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: ordering-api-secrets
          app.kubernetes.io/component: configuration
          app.kubernetes.io/part-of: eshop-platform
  # Data mappings from Vault to Kubernetes Secret
  data:
    - secretKey: DB_CONNECTION
      remoteRef:
        key: secret/data/eshop/ordering-api
        property: DB_CONNECTION
    - secretKey: IDENTITY_URL
      remoteRef:
        key: secret/data/eshop/ordering-api
        property: IDENTITY_URL
