---
# ExternalSecret for Payment API service
# Contains payment gateway API key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-api-secrets
  namespace: eshop
  labels:
    app.kubernetes.io/name: payment-api-secrets
    app.kubernetes.io/component: configuration
    app.kubernetes.io/part-of: eshop-platform
    app.kubernetes.io/managed-by: external-secrets
spec:
  # How often to refresh secrets from Vault
  refreshInterval: "1h"
  # Reference to the ClusterSecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  # Target Kubernetes Secret configuration
  target:
    name: payment-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: payment-api-secrets
          app.kubernetes.io/component: configuration
          app.kubernetes.io/part-of: eshop-platform
  # Data mappings from Vault to Kubernetes Secret
  data:
    - secretKey: PAYMENT_GATEWAY_KEY
      remoteRef:
        key: secret/data/eshop/payment-api
        property: PAYMENT_GATEWAY_KEY
