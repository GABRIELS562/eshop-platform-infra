apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  labels:
    app: postgresql
    env: production
    team: platform
    version: "16"
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        env: production
        team: platform
        version: "16"
    spec:
      serviceAccountName: postgresql
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown -R 999:999 /var/lib/postgresql/data || true
              chmod 700 /var/lib/postgresql/data || true
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgresql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
            - name: POSTGRES_DB
              value: "eshop"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: postgresql-config
              mountPath: /etc/postgresql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: postgresql-config
          configMap:
            name: postgresql-config
        - name: init-scripts
          configMap:
            name: postgresql-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
        labels:
          app: postgresql
          env: production
          team: platform
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgresql
  labels:
    app: postgresql
    env: production
    team: platform
    version: "16"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  labels:
    app: postgresql
    env: production
    team: platform
    version: "16"
type: Opaque
stringData:
  # [placeholder] - Replace with secure credentials before deployment
  # Generate secure values:
  #   password: openssl rand -base64 32
  username: "eshop"
  password: "[placeholder]-replace-with-secure-password"
  # Connection strings for applications
  connection-string: "Host=postgresql;Port=5432;Database=eshop;Username=eshop;Password=[placeholder]-replace-with-secure-password"
  catalog-connection-string: "Host=postgresql;Port=5432;Database=catalog_db;Username=eshop;Password=[placeholder]-replace-with-secure-password"
  identity-connection-string: "Host=postgresql;Port=5432;Database=identity_db;Username=eshop;Password=[placeholder]-replace-with-secure-password"
  ordering-connection-string: "Host=postgresql;Port=5432;Database=ordering_db;Username=eshop;Password=[placeholder]-replace-with-secure-password"
