apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data-standalone
  labels:
    app: postgresql
    env: production
    team: platform
    version: "16"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Uncomment and set the storage class for your cluster
  # storageClassName: standard
