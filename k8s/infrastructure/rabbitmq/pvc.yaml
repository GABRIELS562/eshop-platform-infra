apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data-standalone
  labels:
    app: rabbitmq
    env: production
    team: platform
    version: "3.12"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Uncomment and set the storage class for your cluster
  # storageClassName: standard
