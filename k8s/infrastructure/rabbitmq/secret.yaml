apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  labels:
    app: rabbitmq
    env: production
    team: platform
    version: "3.12"
type: Opaque
stringData:
  # [placeholder] - Replace with secure credentials before deployment
  # Generate secure values:
  #   username: your-secure-username
  #   password: openssl rand -base64 32
  #   erlang-cookie: openssl rand -hex 32
  username: "eshop"
  password: "[placeholder]-replace-with-secure-password"
  erlang-cookie: "[placeholder]-replace-with-secure-erlang-cookie"
  # Connection string for applications
  connection-string: "amqp://eshop:[placeholder]-replace-with-secure-password@rabbitmq:5672/eshop"
