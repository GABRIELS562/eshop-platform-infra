apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-standalone
  labels:
    app: redis
    env: production
    team: platform
    version: "7.2"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # Uncomment and set the storage class for your cluster
  # storageClassName: standard
