apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
    env: production
    team: platform
    version: "7.2"
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  labels:
    app: redis
    env: production
    team: platform
    version: "7.2"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
