apiVersion: apps/v1
kind: Deployment
metadata:
  name: seq
  labels:
    app: seq
    env: production
    team: platform
    version: "2024.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seq
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seq
        env: production
        team: platform
        version: "2024.1"
    spec:
      serviceAccountName: seq
      containers:
        - name: seq
          image: datalust/seq:2024.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: ingestion
              containerPort: 5341
              protocol: TCP
          env:
            - name: ACCEPT_EULA
              value: "Y"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: seq-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: seq-data
          persistentVolumeClaim:
            claimName: seq-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: seq
  labels:
    app: seq
    env: production
    team: platform
    version: "2024.1"
