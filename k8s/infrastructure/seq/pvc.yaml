apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seq-data
  labels:
    app: seq
    env: production
    team: platform
    version: "2024.1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Uncomment and set the storage class for your cluster
  # storageClassName: standard
