apiVersion: v1
kind: Service
metadata:
  name: seq
  labels:
    app: seq
    env: production
    team: platform
    version: "2024.1"
spec:
  type: ClusterIP
  selector:
    app: seq
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: ingestion
      port: 5341
      targetPort: 5341
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: seq-ingestion
  labels:
    app: seq
    env: production
    team: platform
    version: "2024.1"
  annotations:
    description: "Dedicated service for log ingestion from applications"
spec:
  type: ClusterIP
  selector:
    app: seq
  ports:
    - name: ingestion
      port: 5341
      targetPort: 5341
      protocol: TCP
