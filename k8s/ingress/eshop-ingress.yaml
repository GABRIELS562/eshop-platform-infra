---
# eShop Platform Ingress Configuration
# Routes traffic to API Gateway and Web SPA
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshop-web
  namespace: eshop
  labels:
    app.kubernetes.io/name: eshop-web
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: eshop-platform
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: eshop.jagdevops.co.za
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-spa
                port:
                  number: 80
    - host: eshop-local.jagdevops.co.za
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-spa
                port:
                  number: 80
