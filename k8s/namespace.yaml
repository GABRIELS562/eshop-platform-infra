---
# eShop Namespace - Production environment for eShopOnContainers microservices
apiVersion: v1
kind: Namespace
metadata:
  name: eshop
  labels:
    app: eshop
    env: production
    team: platform
    managed-by: argocd
  annotations:
    description: "eShopOnContainers microservices platform"
    owner: "devops-team"
---
# Resource Quota for the eshop namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: eshop-resource-quota
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "100"
    services: "50"
    secrets: "100"
    configmaps: "100"
    persistentvolumeclaims: "20"
---
# Limit Range for default resource constraints
apiVersion: v1
kind: LimitRange
metadata:
  name: eshop-limit-range
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
spec:
  limits:
    - default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
    - max:
        storage: "10Gi"
      type: PersistentVolumeClaim
