---
# Allow ingress from API Gateway to backend services
# API Gateway is the single entry point for all external traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-backends
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
---
# Allow API Gateway to receive external traffic via Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api-gateway
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
---
# Allow Web SPA to receive traffic (frontend static files)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-web-spa
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      app: web-spa
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
