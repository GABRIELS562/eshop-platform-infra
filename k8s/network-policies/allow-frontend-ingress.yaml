---
# Allow frontend to receive external traffic via Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
---
# Allow loadgenerator to access frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loadgenerator-to-frontend
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      app: loadgenerator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 80
