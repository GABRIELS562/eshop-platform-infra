---
# Allow egress to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-postgresql
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: infrastructure
spec:
  podSelector:
    matchLabels:
      needs-database: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
