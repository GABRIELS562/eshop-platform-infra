---
# Allow backend services to communicate with each other via gRPC
# This enables service-to-service communication within the Online Boutique platform
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-inter-service
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        # gRPC ports for Online Boutique services
        - protocol: TCP
          port: 3550   # productcatalogservice
        - protocol: TCP
          port: 5050   # checkoutservice
        - protocol: TCP
          port: 7000   # currencyservice
        - protocol: TCP
          port: 7070   # cartservice
        - protocol: TCP
          port: 8080   # emailservice, recommendationservice
        - protocol: TCP
          port: 9555   # adservice
        - protocol: TCP
          port: 50051  # paymentservice, shippingservice
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 3550
        - protocol: TCP
          port: 5050
        - protocol: TCP
          port: 7000
        - protocol: TCP
          port: 7070
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9555
        - protocol: TCP
          port: 50051
---
# Allow frontend to communicate with all backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backends
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 3550   # productcatalogservice
        - protocol: TCP
          port: 5050   # checkoutservice
        - protocol: TCP
          port: 7000   # currencyservice
        - protocol: TCP
          port: 7070   # cartservice
        - protocol: TCP
          port: 8080   # recommendationservice
        - protocol: TCP
          port: 9555   # adservice
        - protocol: TCP
          port: 50051  # shippingservice
---
# Allow checkoutservice to communicate with all required services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-checkoutservice-egress
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: cartservice
      ports:
        - protocol: TCP
          port: 7070
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - protocol: TCP
          port: 3550
    - to:
        - podSelector:
            matchLabels:
              app: shippingservice
      ports:
        - protocol: TCP
          port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: paymentservice
      ports:
        - protocol: TCP
          port: 50051
    - to:
        - podSelector:
            matchLabels:
              app: emailservice
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: currencyservice
      ports:
        - protocol: TCP
          port: 7000
---
# Allow recommendationservice to communicate with productcatalogservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-recommendationservice-egress
  namespace: eshop
  labels:
    app: eshop
    env: production
    team: platform
    policy-type: application
spec:
  podSelector:
    matchLabels:
      app: recommendationservice
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - protocol: TCP
          port: 3550
