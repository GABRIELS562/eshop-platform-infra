---
# Allow ingress to OTel Collector from all eshop services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-collector-ingress
  namespace: eshop
  labels:
    app: otel-collector
    env: production
    team: platform
    policy-type: observability
spec:
  podSelector:
    matchLabels:
      app: otel-collector
  policyTypes:
    - Ingress
  ingress:
    # Allow OTLP from all eshop services
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8889
    # Allow external Prometheus scraping via NodePort
    - ports:
        - protocol: TCP
          port: 8889
---
# Allow egress from services to OTel Collector
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-collector-egress
  namespace: eshop
  labels:
    app: otel-collector
    env: production
    team: platform
    policy-type: observability
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: NotIn
        values:
          - otel-collector
  policyTypes:
    - Egress
  egress:
    # Allow services to send traces to OTel Collector
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
