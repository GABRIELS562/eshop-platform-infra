---
# Service Accounts for each eShop service
# Following principle of least privilege - no service uses default SA
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: basket-api-sa
  namespace: eshop
  labels:
    app: basket-api
    env: production
    team: platform
automountServiceAccountToken: false
---
