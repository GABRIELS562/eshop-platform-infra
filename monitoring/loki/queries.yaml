# Loki Log Queries for Online Boutique Platform
# Use these queries in Grafana Explore or dashboards

queries:
  # Error logs per service
  - name: "Error Logs - All Services"
    query: '{namespace="eshop"} |= "error" | json'
    description: "All error logs from eshop namespace"

  - name: "Error Logs - Frontend"
    query: '{namespace="eshop", app="frontend"} |= "error" | json'

  - name: "Error Logs - Checkout Service"
    query: '{namespace="eshop", app="checkoutservice"} |= "error" | json'

  - name: "Error Logs - Cart Service"
    query: '{namespace="eshop", app="cartservice"} |= "error" | json'

  - name: "Error Logs - Product Catalog"
    query: '{namespace="eshop", app="productcatalogservice"} |= "error" | json'

  - name: "Error Logs - Payment Service"
    query: '{namespace="eshop", app="paymentservice"} |= "error" | json'

  - name: "Error Logs - Shipping Service"
    query: '{namespace="eshop", app="shippingservice"} |= "error" | json'

  - name: "Error Logs - Currency Service"
    query: '{namespace="eshop", app="currencyservice"} |= "error" | json'

  - name: "Error Logs - Email Service"
    query: '{namespace="eshop", app="emailservice"} |= "error" | json'

  - name: "Error Logs - Recommendation Service"
    query: '{namespace="eshop", app="recommendationservice"} |= "error" | json'

  - name: "Error Logs - Ad Service"
    query: '{namespace="eshop", app="adservice"} |= "error" | json'

  # Slow request logs (> 1 second)
  - name: "Slow Requests - All Services"
    query: |
      {namespace="eshop"}
      | json
      | duration > 1s
    description: "Requests taking longer than 1 second"

  - name: "Slow Requests - Frontend"
    query: |
      {namespace="eshop", app="frontend"}
      | json
      | __error__=""
      | elapsed_ms > 1000
      | line_format "{{.method}} {{.path}} - {{.elapsed_ms}}ms"

  # gRPC errors
  - name: "gRPC Errors"
    query: |
      {namespace="eshop"}
      |~ "(?i)(grpc.*error|rpc.*failed|status.*unavailable)"
    description: "gRPC communication errors"

  - name: "gRPC Connection Issues"
    query: |
      {namespace="eshop"}
      |~ "(?i)(connection.*refused|dial.*error|transport.*closing)"

  # Checkout flow errors
  - name: "Checkout Errors"
    query: |
      {namespace="eshop", app="checkoutservice"}
      |~ "(?i)(failed|error|exception)"
    description: "Errors during checkout process"

  - name: "Payment Processing Errors"
    query: |
      {namespace="eshop", app="paymentservice"}
      |~ "(?i)(charge.*failed|payment.*error|invalid.*card)"

  # Cart operations
  - name: "Cart Service Errors"
    query: |
      {namespace="eshop", app="cartservice"}
      |~ "(?i)(redis|cache|cart.*error)"

  # Redis connection errors
  - name: "Redis Connection Errors"
    query: |
      {namespace="eshop"}
      |~ "(?i)(redis.*error|redis.*connection|redis.*timeout)"

  # Service startup and health
  - name: "Service Startup Events"
    query: |
      {namespace="eshop"}
      |~ "(?i)(started|listening|ready|initialized|serving)"

  - name: "Health Check Failures"
    query: |
      {namespace="eshop"}
      |~ "(?i)(health.*check.*failed|unhealthy|degraded)"

  # Exception tracking
  - name: "Unhandled Exceptions"
    query: |
      {namespace="eshop"}
      |~ "(?i)(unhandled.*exception|stack.*trace|fatal|panic)"

  - name: "HTTP 5xx Responses"
    query: |
      {namespace="eshop"}
      | json
      | status_code >= 500

  # Load generator logs
  - name: "Load Generator Activity"
    query: |
      {namespace="eshop", app="loadgenerator"}
    description: "Traffic generator activity logs"

  - name: "Load Generator Errors"
    query: |
      {namespace="eshop", app="loadgenerator"}
      |~ "(?i)(error|failed|timeout)"

# Dashboard panel configurations
dashboard_panels:
  - title: "Error Rate by Service"
    type: "timeseries"
    query: |
      sum by (app) (
        count_over_time({namespace="eshop"} |= "error" [1m])
      )

  - title: "Log Volume by Service"
    type: "timeseries"
    query: |
      sum by (app) (
        count_over_time({namespace="eshop"} [1m])
      )

  - title: "gRPC Error Rate"
    type: "stat"
    query: |
      count_over_time(
        {namespace="eshop"}
        |~ "(?i)grpc.*error" [1h]
      )

  - title: "Checkout Success Rate"
    type: "stat"
    query: |
      count_over_time(
        {namespace="eshop", app="checkoutservice"}
        |~ "order.*placed" [24h]
      )
