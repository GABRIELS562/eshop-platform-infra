---
# ServiceMonitor for scraping Online Boutique services metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: eshop-services
  namespace: monitoring
  labels:
    app: eshop
    env: production
    team: platform
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - eshop
  selector:
    matchLabels:
      env: production
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
    - port: grpc
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
---
# ServiceMonitor for frontend (HTTP metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
